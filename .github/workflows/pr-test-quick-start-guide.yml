name: PR Test Quick Start Guide

on:
  pull_request:
    types: [ opened, edited, reopened, synchronize, ready_for_review ]
    branches:
    - main
    paths:
    - 'docs/user-guide/src/quick-start.md'
    - 'hack/quick-start/**'
    - '.github/workflows/test-quick-start-guide.yml'
    - '.github/workflows/pr-test-quick-start-guide.yml'

permissions:
  contents: read

jobs:
  e2e-test:
    uses: ./.github/workflows/test-quick-start-guide.yml
    with:
      runner: "ubuntu-latest"
      timeout-minutes: 90
